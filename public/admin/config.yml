# Decap CMS configuration — loaded by /admin/index.html.
#
# Kept in sync with the Zod schema at src/content.config.ts (for
# listings and pages) and the i18n JSON files at src/i18n/*.json.
# When a field changes, update both places in the same PR.
#
# All collections commit direct-to-`main` (see DECISIONS.md). There is
# no editorial workflow — the Zod schema validates at build time and
# `git revert` is always available if a bad commit lands.

backend:
  name: github
  repo: Mutual-Aid-Phoenix/mutual-aid-phoenix
  branch: main
  # Our OAuth proxy (functions/api/auth.ts + .../callback.ts).
  base_url: https://mutual-aid-phoenix.pages.dev
  auth_endpoint: /api/auth
  # Public half of the GitHub OAuth App pair. Safe to commit — it's
  # visible in every OAuth redirect URL anyway. The secret lives in
  # Cloudflare Pages as `OAUTH_CLIENT_SECRET`.
  # Callback URL: https://mutual-aid-phoenix.pages.dev/api/auth/callback
  client_id: Ov23lizl0GVxfaKrSxni

# Where Decap commits binary uploads. Kept empty for v1 — we aren't
# taking user-uploaded media yet.
media_folder: public/media/cms
public_folder: /media/cms

# Show diffs on the commit message Decap generates.
slug:
  encoding: ascii
  clean_accents: true

collections:
  # -------------------------------------------------------------------
  # Listings — the main volunteer workflow.
  # Fields mirror the Zod schema in src/content.config.ts. Bilingual
  # fields are modeled as object widgets with `en` + `es` sub-fields,
  # not Decap's native i18n (our frontmatter shape doesn't match
  # Decap's single_file i18n storage).
  # -------------------------------------------------------------------
  - name: listings
    label: Listings
    label_singular: Listing
    description: >
      Mutual aid resources — community fridges, distros, free tables,
      meals, resource centers, and more. Fields marked bilingual need
      both an English and Spanish translation. Coordinates must fall
      inside the Greater Phoenix metro bounding box or the build will
      fail.
    folder: src/content/listings
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    summary: "{{name.en}} ({{resource_type}})"
    sortable_fields:
      - last_verified_date
      - city
    fields:
      # Identity & copy (bilingual)
      - label: "Name (bilingual)"
        name: name
        widget: object
        fields:
          - { label: English, name: en, widget: string }
          - { label: Español, name: es, widget: string }
      - label: "Location name (bilingual)"
        name: location_name
        hint: >
          Short name for the spot itself — e.g., "Roosevelt Library",
          "Corner of 7th Ave & Van Buren". Shown beneath the name.
        widget: object
        fields:
          - { label: English, name: en, widget: string }
          - { label: Español, name: es, widget: string }
      - label: "Description (bilingual)"
        name: description
        widget: object
        fields:
          - { label: English, name: en, widget: text }
          - { label: Español, name: es, widget: text }
      - label: "Barriers to entry (bilingual)"
        name: barriers_to_entry
        hint: >
          Any requirement to receive resources here — ID, sign-in,
          eligibility questions, etc. Write "None" if there are none.
        widget: object
        fields:
          - { label: English, name: en, widget: text }
          - { label: Español, name: es, widget: text }
      - label: "Accessibility notes (bilingual)"
        name: accessibility_notes
        hint: >
          Wheelchair access, restroom availability, step-free entry,
          etc. Be concrete — "Step-free entry, accessible restroom on
          site" beats "accessible".
        widget: object
        fields:
          - { label: English, name: en, widget: text }
          - { label: Español, name: es, widget: text }

      # Classification
      - label: Resource type
        name: resource_type
        widget: select
        multiple: true
        min: 1
        options:
          - { label: Distro, value: distro }
          - { label: Community fridge, value: fridge }
          - { label: Free table, value: free-table }
          - { label: Meals, value: meals }
          - { label: Resource center, value: resource-center }
          - { label: Other, value: other }
      - label: Category
        name: category
        widget: select
        multiple: true
        min: 1
        options:
          - { label: Food, value: food }
          - { label: Harm reduction, value: harm-reduction }
          - { label: Medical, value: medical }
          - { label: Transportation, value: transportation }
          - { label: Hygiene, value: hygiene }
          - { label: Clothing, value: clothing }
          - { label: Shelter, value: shelter }
          - { label: Other, value: other }
      - label: Region
        name: region
        widget: select
        options:
          - { label: Central Phoenix, value: central-phoenix }
          - { label: North Phoenix, value: north-phoenix }
          - { label: South Phoenix, value: south-phoenix }
          - { label: East Valley, value: east-valley }
          - { label: West Valley, value: west-valley }
      - label: Seasons (optional — only if seasonal)
        name: seasons
        required: false
        widget: select
        multiple: true
        options:
          - { label: Spring, value: spring }
          - { label: Summer, value: summer }
          - { label: Fall, value: fall }
          - { label: Winter, value: winter }

      # Location
      - { label: "Address line 1", name: address_1, widget: string }
      - { label: "Address line 2 (optional)", name: address_2, widget: string, required: false }
      - { label: City, name: city, widget: string }
      - { label: State, name: state, widget: string, default: AZ, pattern: ["^[A-Z]{2}$", "Two-letter state code"] }
      - { label: ZIP code, name: zip_code, widget: string, pattern: ['^\d{5}(-\d{4})?$', "5 digits or ZIP+4"] }
      - label: Latitude
        name: lat
        widget: number
        value_type: float
        step: 0.000001
        hint: >
          Decimal degrees — e.g., 33.4484. Use the geocoding helper at
          /admin/geocode.html if you don't have coordinates yet.
      - label: Longitude
        name: lng
        widget: number
        value_type: float
        step: 0.000001
        hint: >
          Decimal degrees — e.g., -112.0740. Must be negative in
          Arizona.

      # Access
      - label: Languages spoken
        name: languages_spoken
        widget: list
        summary: "{{fields.code}}"
        field:
          label: "Language code (ISO 639-1, 2 letters)"
          name: code
          widget: string
          pattern: ["^[a-z]{2}$", "Two lowercase letters"]
      - label: "Contact (optional)"
        name: contact
        required: false
        widget: object
        collapsed: true
        fields:
          - { label: Phone, name: phone, widget: string, required: false }
          - { label: Email, name: email, widget: string, required: false }
          - { label: URL, name: url, widget: string, required: false }

      # Schedule — one of: always-open, by-appointment, one-off, recurring.
      # Fill in only the fields that match the chosen kind; the build
      # validates the combination.
      - label: Schedule
        name: schedule
        widget: object
        fields:
          - label: Kind
            name: kind
            widget: select
            options:
              - { label: Always open, value: always-open }
              - { label: By appointment, value: by-appointment }
              - { label: One-time event, value: one-off }
              - { label: Recurring, value: recurring }
          - label: "By-appointment note (bilingual, optional)"
            name: note
            required: false
            widget: object
            collapsed: true
            fields:
              - { label: English, name: en, widget: string, required: false }
              - { label: Español, name: es, widget: string, required: false }
          - label: "One-off date"
            name: date
            required: false
            widget: datetime
            date_format: "YYYY-MM-DD"
            time_format: false
          - label: "One-off start time (HH:MM, 24-hour, optional)"
            name: start_time
            required: false
            widget: string
            pattern: ['^([01]\d|2[0-3]):[0-5]\d$', "HH:MM 24-hour"]
          - label: "One-off end time (HH:MM, 24-hour, optional)"
            name: end_time
            required: false
            widget: string
            pattern: ['^([01]\d|2[0-3]):[0-5]\d$', "HH:MM 24-hour"]
          - label: "Recurring — start date (optional)"
            name: start_date
            required: false
            widget: datetime
            date_format: "YYYY-MM-DD"
            time_format: false
          - label: "Recurring — end date (optional)"
            name: end_date
            required: false
            widget: datetime
            date_format: "YYYY-MM-DD"
            time_format: false
          - label: "Recurring — weekly slots"
            name: weekly
            required: false
            widget: list
            summary: "{{fields.day}} {{fields.start_time}}–{{fields.end_time}}"
            fields:
              - label: Day
                name: day
                widget: select
                options: [mon, tue, wed, thu, fri, sat, sun]
              - { label: Start time (HH:MM), name: start_time, widget: string, pattern: ['^([01]\d|2[0-3]):[0-5]\d$', "HH:MM 24-hour"] }
              - { label: End time (HH:MM), name: end_time, widget: string, pattern: ['^([01]\d|2[0-3]):[0-5]\d$', "HH:MM 24-hour"] }
          - label: "Recurring — monthly slots"
            name: monthly
            required: false
            widget: list
            summary: "Week {{fields.week}} — {{fields.day}} {{fields.start_time}}–{{fields.end_time}}"
            fields:
              - label: "Week of month (1–5; 5 = last)"
                name: week
                widget: number
                value_type: int
                min: 1
                max: 5
              - label: Day
                name: day
                widget: select
                options: [mon, tue, wed, thu, fri, sat, sun]
              - { label: Start time (HH:MM), name: start_time, widget: string, pattern: ['^([01]\d|2[0-3]):[0-5]\d$', "HH:MM 24-hour"] }
              - { label: End time (HH:MM), name: end_time, widget: string, pattern: ['^([01]\d|2[0-3]):[0-5]\d$', "HH:MM 24-hour"] }

      # Provenance & freshness
      - label: Last verified date
        name: last_verified_date
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: >
          The date you last confirmed this resource is still operating
          as described. Listings older than 90 days show a "Needs
          verification" badge.
      - { label: "Source URL (optional)", name: source_url, widget: string, required: false }

  # -------------------------------------------------------------------
  # Pages — Home + Accessibility Statement, one entry per (page × locale).
  # -------------------------------------------------------------------
  - name: pages
    label: Pages
    label_singular: Page
    description: >
      Long-form page content. One entry per page per language. Edit
      the English version and its Spanish counterpart separately.
    folder: src/content/pages
    create: false
    delete: false
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    # Store files under {locale}/{page}.md. The "path" template preserves
    # that structure when Decap commits.
    path: "{{locale}}/{{slug}}"
    fields:
      - { label: Locale, name: locale, widget: select, options: [en, es] }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Last updated, name: last_updated, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: Body, name: body, widget: markdown }

  # -------------------------------------------------------------------
  # Translations — UI strings in src/i18n/*.json. Edited as raw JSON
  # for v1; a friendlier editor is a future enhancement.
  # -------------------------------------------------------------------
  - name: translations
    label: UI Translations
    files:
      - label: English
        name: en
        file: src/i18n/en.json
        fields:
          - { label: "JSON content", name: body, widget: code, default_language: json, output_code_only: true }
      - label: Español
        name: es
        file: src/i18n/es.json
        fields:
          - { label: "JSON content", name: body, widget: code, default_language: json, output_code_only: true }
