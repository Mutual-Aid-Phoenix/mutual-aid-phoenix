# Decap CMS configuration — loaded by /admin/index.html.
#
# Kept in sync with the Zod schema at src/content.config.ts (for
# listings and pages). UI translations in src/i18n/*.json are edited
# directly in the repo for v1 — not exposed as a Decap collection.
# When a field changes, update both places in the same PR.
#
# All collections commit direct-to-`main` (see DECISIONS.md). There is
# no editorial workflow — the Zod schema validates at build time and
# `git revert` is always available if a bad commit lands.
#
# Custom widgets live in public/admin/custom-widgets.js:
#   - bilingual  — EN/ES paired inputs (no nested card).
#   - heading    — section divider (saves nothing to frontmatter).
#   - schedule   — conditional schedule form.
#   - location   — address + geocode + map preview.

backend:
  name: github
  repo: Mutual-Aid-Phoenix/mutual-aid-phoenix
  branch: main
  # Our OAuth proxy (functions/api/auth.ts + .../callback.ts).
  base_url: https://mutual-aid-phoenix.pages.dev
  auth_endpoint: /api/auth
  # Public half of the GitHub OAuth App pair. Safe to commit — it's
  # visible in every OAuth redirect URL anyway. The secret lives in
  # Cloudflare Pages as `OAUTH_CLIENT_SECRET`.
  # Callback URL: https://mutual-aid-phoenix.pages.dev/api/auth/callback
  client_id: Ov23lizl0GVxfaKrSxni

# Where Decap commits binary uploads. Kept empty for v1 — we aren't
# taking user-uploaded media yet.
media_folder: public/media/cms
public_folder: /media/cms

# Show diffs on the commit message Decap generates.
slug:
  encoding: ascii
  clean_accents: true

collections:
  # -------------------------------------------------------------------
  # Listings — the main volunteer workflow.
  # Fields mirror the Zod schema in src/content.config.ts. Bilingual
  # fields use the custom `bilingual` widget which writes `{en, es}`.
  # -------------------------------------------------------------------
  - name: listings
    label: Listings
    label_singular: Listing
    description: >
      Mutual aid resources — community fridges, distros, free tables,
      meals, resource centers, and more. Fields without "(Optional)"
      are required. Bilingual fields need both an English and Spanish
      translation. Coordinates must fall inside the Greater Phoenix
      metro bounding box or the build will fail.
    folder: src/content/listings
    create: true
    delete: true
    # The slug becomes the filename. We route it through a hidden
    # `slug` field that's populated by a `preSave` event listener in
    # custom-widgets.js — it slugifies `name.en` and appends `-2`,
    # `-3`, etc. on collision so two listings with the same English
    # name never overwrite each other.
    #
    # Why not `{{fields.name.en}}` directly? Decap's slug-template
    # resolver doesn't reliably drill into the value of a *custom*
    # widget (our `bilingual` widget is one), so nested paths like
    # `{{fields.name.en}}` resolve to an empty string and the file
    # saves as `.md`. Targeting a flat top-level field sidesteps that.
    slug: "{{fields.slug}}"
    extension: md
    format: yaml-frontmatter
    # Preview pane adds little value here — our custom widgets already
    # give inline formatted feedback (map, schedule sentences, coord
    # badge). Volunteers can pull the published site up in another tab
    # to see the real card. Turning off also removes a class of React
    # version warnings from the Decap preview renderer.
    editor:
      preview: false
    # `summary` is the primary (bold) title shown in the list view.
    # `summary_fields` adds compact secondary lines beneath it.
    summary: "{{name.en}}"
    summary_fields:
      - region
      - resource_type
      - last_verified_date
    sortable_fields:
      - last_verified_date
    fields:
      # Hidden slug field — written by the preSave hook in
      # custom-widgets.js. Never rendered; exists only so the slug
      # template above (`{{fields.slug}}`) has something to resolve.
      - { label: Slug, name: slug, widget: hidden, required: false }

      # ---------------------------------------------------------------
      # SECTION: Name & Description
      # ---------------------------------------------------------------
      - label: "Name & Description"
        name: _section_naming
        widget: heading
        required: false
        description: >
          The public-facing copy volunteers see on the site.

      - label: "Name"
        name: name
        widget: bilingual
        variant: string
        placeholder_en: e.g., Roosevelt Community Fridge
        placeholder_es: ej., Nevera Comunitaria Roosevelt

      - label: "Description"
        name: description
        widget: bilingual
        variant: text

      # ---------------------------------------------------------------
      # SECTION: Details — classification enums.
      # ---------------------------------------------------------------
      - label: "Details"
        name: _section_details
        widget: heading
        required: false
        description: >
          How this resource is categorized and where it lives.

      - label: Resource type
        name: resource_type
        widget: select
        multiple: true
        min: 1
        options:
          - { label: Distro, value: distro }
          - { label: Community fridge, value: fridge }
          - { label: Free table, value: free-table }
          - { label: Meals, value: meals }
          - { label: Resource center, value: resource-center }
          - { label: Other, value: other }
      - label: Category
        name: category
        widget: select
        multiple: true
        min: 1
        options:
          - { label: Food, value: food }
          - { label: Harm reduction, value: harm-reduction }
          - { label: Medical, value: medical }
          - { label: Transportation, value: transportation }
          - { label: Hygiene, value: hygiene }
          - { label: Clothing, value: clothing }
          - { label: Shelter, value: shelter }
          - { label: Other, value: other }
      - label: Region
        name: region
        widget: select
        options:
          - { label: Central Phoenix, value: central-phoenix }
          - { label: North Phoenix, value: north-phoenix }
          - { label: South Phoenix, value: south-phoenix }
          - { label: East Valley, value: east-valley }
          - { label: West Valley, value: west-valley }
      - label: Seasons
        name: seasons
        required: false
        hint: Only fill in if the resource is seasonal (e.g., summer cooling center, winter shelter).
        widget: select
        multiple: true
        options:
          - { label: Spring, value: spring }
          - { label: Summer, value: summer }
          - { label: Fall, value: fall }
          - { label: Winter, value: winter }

      # ---------------------------------------------------------------
      # SECTION: Location
      # ---------------------------------------------------------------
      - label: "Location"
        name: _section_location
        widget: heading
        required: false
        description: >
          Fill in the street address and ZIP, then click
          "Find on map" to look up the coordinates. Verify the pin
          on the map preview before saving.

      - label: "Location name"
        name: location_name
        widget: bilingual
        variant: string
        hint: >
          Short name for the spot itself — e.g., "Roosevelt Library",
          "Corner of 7th Ave & Van Buren". Shown beneath the listing name.

      - label: Address & map
        name: location
        widget: location

      # ---------------------------------------------------------------
      # SECTION: Schedule
      # ---------------------------------------------------------------
      - label: "Schedule"
        name: _section_schedule
        widget: heading
        required: false
        description: >
          Pick a schedule type first — the form will show only the
          fields that apply (dates for one-off events, weekly/monthly
          slots for recurring programs, etc.).

      - label: Schedule
        name: schedule
        widget: schedule

      # ---------------------------------------------------------------
      # SECTION: Additional Details
      # Access notes, languages, contact, and the freshness timestamp.
      # ---------------------------------------------------------------
      - label: "Additional Details"
        name: _section_access
        widget: heading
        required: false
        description: >
          Access notes, who can communicate here, how to reach them,
          and when this listing was last confirmed.

      - label: "Barriers to entry"
        name: barriers_to_entry
        widget: bilingual
        variant: text
        required: false
        hint: >
          Any requirement to receive resources here — ID, sign-in,
          eligibility questions, etc. Leave blank if there are none.

      - label: "Accessibility notes"
        name: accessibility_notes
        widget: bilingual
        variant: text
        required: false
        hint: >
          Wheelchair access, restroom availability, step-free entry,
          etc. Be concrete — "Step-free entry, accessible restroom on
          site" beats "accessible".

      - label: Languages spoken
        name: languages_spoken
        widget: select
        multiple: true
        required: false
        hint: >
          Languages staff/volunteers can converse in on-site. Used to
          drive the list-view language filter. Leave blank if unknown.
        options:
          - { label: "English (en)", value: en }
          - { label: "Español (es)", value: es }
          - { label: "Tiếng Việt (vi)", value: vi }
          - { label: "中文 (zh)", value: zh }
          - { label: "Tagalog (tl)", value: tl }
          - { label: "العربية (ar)", value: ar }
          - { label: "Soomaali (so)", value: so }
          - { label: "Français (fr)", value: fr }
          - { label: "Diné bizaad / Navajo (nv)", value: nv }
      - label: "Contact"
        name: contact
        required: false
        widget: object
        collapsed: true
        fields:
          - { label: Phone, name: phone, widget: string, required: false }
          - { label: Email, name: email, widget: string, required: false }
          - { label: URL, name: url, widget: string, required: false }
      - label: Last verified date
        name: last_verified_date
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: >
          The date you last confirmed this resource is still operating
          as described. Listings older than 90 days show a "Needs
          verification" badge.

  # -------------------------------------------------------------------
  # Pages — one entry per (page × locale).
  # Modeled as a files-collection (not folder) so each locale variant is
  # its own explicit entry. Locale lives only in the file path; there is
  # no `locale` frontmatter field. Adding a new page means adding a new
  # entry here and a matching file under src/content/pages/{locale}/.
  # -------------------------------------------------------------------
  - name: pages
    label: Pages
    label_singular: Page
    description: >
      Long-form page content. One entry per page per language. Edit
      the English version and its Spanish counterpart separately.
    files:
      - label: "Home — English"
        name: home_en
        file: src/content/pages/en/home.md
        format: frontmatter
        extension: md
        fields: &page_fields
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: string, required: false }
          - { label: Last updated, name: last_updated, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false }
          - { label: Body, name: body, widget: markdown }
      - label: "Home — Español"
        name: home_es
        file: src/content/pages/es/home.md
        format: frontmatter
        extension: md
        fields: *page_fields
